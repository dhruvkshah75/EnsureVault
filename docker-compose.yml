version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ensurevault-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ensurevault
    ports:
      - "3307:3306"
    volumes:
      # Mount the sql directory so MySQL executes schema -> seed -> procs in alphabetical order on first boot
      - ./backend/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ensurevault-backend
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=ensurevault
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    container_name: ensurevault-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
