name: EnsureVault CI

# Run this workflow on pushes to any branch and pull requests to main
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  # -------------------------------------------------------------
  # FRONTEND: Lint & Test
  # -------------------------------------------------------------
  frontend-checks:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

  # -------------------------------------------------------------
  # BACKEND: Lint & Test
  # -------------------------------------------------------------
  backend-checks:
    name: Backend Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        run: uv sync --frozen

      # Run flake8 or similar if it exists, otherwise just check the import graph or syntax
      - name: Syntax & Import Check (Lint Placeholder)
        run: |
          uv run python -m compileall src/
          
      # Run pytest if tests exist, otherwise this will just pass or warn
      # Modify this as Aayush writes backend tests!
      - name: Run Tests (Placeholder)
        run: |
          echo "No backend tests explicitly defined yet. Add uv run pytest here."
